<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avito Real Estate Header</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div class="header-top">
          <nav class="top-links" aria-label="Дополнительная навигация">
            <a class="top-link top-link-with-icon" href="#">
              <span>Для бизнеса</span>
              <img src="https://www.figma.com/api/mcp/asset/9bfcb9b3-c0b2-4c19-bd91-0c573ca83800" alt="" aria-hidden="true">
            </a>
            <a class="top-link" href="#">Карьера в Авито</a>
            <a class="top-link" href="#">Помощь</a>
            <a class="top-link top-link-with-icon" href="#">
              <span>Каталоги</span>
              <img src="https://www.figma.com/api/mcp/asset/9bfcb9b3-c0b2-4c19-bd91-0c573ca83800" alt="" aria-hidden="true">
            </a>
            <a class="top-link" href="#">#яПомогаю</a>
            <a class="top-link top-link-with-icon" href="#">
              <span>Ещё</span>
              <img src="https://www.figma.com/api/mcp/asset/9bfcb9b3-c0b2-4c19-bd91-0c573ca83800" alt="" aria-hidden="true">
            </a>
          </nav>

          <div class="top-actions">
            <a class="top-action" href="#">
              <img src="https://www.figma.com/api/mcp/asset/407ecc7a-5f23-447b-9510-d694f6d967a6" alt="" aria-hidden="true">
              <span>Мои объявления</span>
            </a>
            <a class="top-action" href="#">
              <img src="https://www.figma.com/api/mcp/asset/176dcc61-5c8c-4bc2-8d61-4ad0103a2efc" alt="" aria-hidden="true">
              <span>Разместить объявление</span>
            </a>
          </div>
        </div>

        <div class="header-main">
          <a class="brand" href="#" aria-label="Avito Недвижимость">
            <span class="brand-mark" aria-hidden="true">
              <span class="brand-dot brand-dot-blue"></span>
              <span class="brand-dot brand-dot-green"></span>
              <span class="brand-dot brand-dot-red"></span>
              <span class="brand-dot brand-dot-teal"></span>
            </span>
            <span class="brand-name">Avito</span>
            <span class="brand-section">Недвижимость</span>
          </a>

          <div class="search-panel">
            <button class="category-button" type="button">
              <svg class="control-icon control-icon-category" viewBox="0 0 20 20" aria-hidden="true">
                <rect x="3" y="4" width="5" height="5" rx="1.2"></rect>
                <rect x="12" y="4" width="5" height="5" rx="1.2"></rect>
                <rect x="3" y="11" width="5" height="5" rx="1.2"></rect>
                <rect x="12" y="11" width="5" height="5" rx="1.2"></rect>
              </svg>
              <span>Все категории</span>
            </button>

            <label class="search-field" aria-label="Поиск по объявлениям">
              <svg class="control-icon control-icon-search" viewBox="0 0 20 20" aria-hidden="true">
                <circle cx="8.5" cy="8.5" r="4.5"></circle>
                <path d="M12 12L16 16"></path>
              </svg>
              <input type="text" placeholder="Поиск по объявлениям">
            </label>
          </div>

          <a class="location" href="#">
            <svg class="control-icon control-icon-location" viewBox="0 0 20 20" aria-hidden="true">
              <path d="M10 17C7.4 13.8 6 11.3 6 8.9C6 6.2 7.8 4 10 4C12.2 4 14 6.2 14 8.9C14 11.3 12.6 13.8 10 17Z"></path>
              <circle cx="10" cy="9" r="1.8"></circle>
            </svg>
            <span>Петропавловск-Камчатский</span>
          </a>

          <nav class="header-icons" aria-label="Пользовательские действия">
            <a class="header-icon header-icon-muted" href="#" aria-label="Избранное">
              <img src="https://www.figma.com/api/mcp/asset/5e4dcd03-92bd-4657-83b3-1efc5edbf263" alt="">
            </a>
            <a class="header-icon header-icon-muted" href="#" aria-label="Уведомления">
              <img src="https://www.figma.com/api/mcp/asset/12846fa4-0dd4-41d5-900c-a8fba37a5c6b" alt="">
            </a>
            <a class="header-icon header-icon-muted" href="#" aria-label="Чат">
              <img src="https://www.figma.com/api/mcp/asset/6ca321f1-fe20-42b8-bc26-ec7491653b4d" alt="">
            </a>
            <a class="header-icon" href="#" aria-label="Сервисы">
              <img src="https://www.figma.com/api/mcp/asset/87de1b8e-6240-4fd5-a993-85caf5025320" alt="">
            </a>
          </nav>

          <a class="profile-link" href="#" aria-label="Профиль">
            <img src="https://www.figma.com/api/mcp/asset/f1bdc035-cd01-42c4-95b5-564e8fdf4baf" alt="">
          </a>
        </div>
      </div>
    </header>
  </body>
</html>
