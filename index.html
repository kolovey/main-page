<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="banner" aria-labelledby="banner-title">
      <div class="banner__content">
        <h1 class="banner__title" id="banner-title">Сюда писать заголовок</h1>
        <p class="banner__description">
          Тут должно быть короткое описание того, что ты хочешь сказать пользователю
        </p>
        <button class="banner__button" type="button">Текст</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
