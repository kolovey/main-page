<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avito Real Estate Header</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div class="header-top">
          <nav class="top-links" aria-label="Дополнительная навигация">
            <span class="top-link top-link-with-icon">
              <span>Для бизнеса</span>
              <img src="https://www.figma.com/api/mcp/asset/9bfcb9b3-c0b2-4c19-bd91-0c573ca83800" alt="" aria-hidden="true">
            </span>
            <span class="top-link">Карьера в Авито</span>
            <span class="top-link">Помощь</span>
            <span class="top-link top-link-with-icon">
              <span>Каталоги</span>
              <img src="https://www.figma.com/api/mcp/asset/9bfcb9b3-c0b2-4c19-bd91-0c573ca83800" alt="" aria-hidden="true">
            </span>
            <span class="top-link">#яПомогаю</span>
            <span class="top-link top-link-with-icon">
              <span>Ещё</span>
              <img src="https://www.figma.com/api/mcp/asset/9bfcb9b3-c0b2-4c19-bd91-0c573ca83800" alt="" aria-hidden="true">
            </span>
          </nav>

          <div class="top-actions">
            <span class="top-action">
              <img src="https://www.figma.com/api/mcp/asset/f77aa345-2e24-452e-ac43-db42f6258983" alt="" aria-hidden="true">
              <span>Мои объявления</span>
            </span>
            <span class="top-action">
              <img src="https://www.figma.com/api/mcp/asset/6ffacd87-4af4-47b0-997c-33e5c485a082" alt="" aria-hidden="true">
              <span>Разместить объявление</span>
            </span>
          </div>
        </div>

        <div class="header-main">
          <div class="brand" aria-label="Avito">
            <span class="brand-logo" aria-hidden="true">
              <img class="brand-piece brand-piece-a" src="https://www.figma.com/api/mcp/asset/73d2c970-52f3-4842-bade-d5d3669a55cf" alt="">
              <img class="brand-piece brand-piece-v" src="https://www.figma.com/api/mcp/asset/36694f73-31a1-418f-9c1f-125cdd86557b" alt="">
              <img class="brand-piece brand-piece-i" src="https://www.figma.com/api/mcp/asset/fc9150ac-8926-47b7-a402-eca62745841b" alt="">
              <img class="brand-piece brand-piece-dot-text" src="https://www.figma.com/api/mcp/asset/13bd572f-ff6c-434c-ac08-523d9cf37cc5" alt="">
              <img class="brand-piece brand-piece-t" src="https://www.figma.com/api/mcp/asset/acdc56a4-6ba5-4100-a75d-6a3810162be6" alt="">
              <img class="brand-piece brand-piece-o" src="https://www.figma.com/api/mcp/asset/5b361c94-ce77-42a7-bf77-ab6d7d565ae0" alt="">
              <img class="brand-piece brand-piece-dot-left" src="https://www.figma.com/api/mcp/asset/00e1e743-ea7f-4f90-9c0f-05501be342d2" alt="">
              <img class="brand-piece brand-piece-dot-bottom" src="https://www.figma.com/api/mcp/asset/c67d7e74-ed02-4c65-a2b8-8067d095d0e1" alt="">
              <img class="brand-piece brand-piece-dot-top" src="https://www.figma.com/api/mcp/asset/91839740-015b-4f8b-b108-e3d4e42c71b1" alt="">
              <img class="brand-piece brand-piece-dot-right" src="https://www.figma.com/api/mcp/asset/52bb5d60-b23f-43bc-93f3-b98402593ebd" alt="">
            </span>
          </div>

          <div class="search-panel">
            <div class="category-button">
              <img class="control-icon control-icon-category" src="https://www.figma.com/api/mcp/asset/235dec2b-9465-4a7a-8bb5-5d83ac4a74b5" alt="" aria-hidden="true">
              <span>Все категории</span>
            </div>

            <div class="search-field" aria-label="Поиск по объявлениям">
              <span class="search-field-main">
                <img class="control-icon control-icon-search" src="https://www.figma.com/api/mcp/asset/e8260de4-bcbe-4c98-979c-3562c8b53cff" alt="" aria-hidden="true">
                <span class="search-placeholder">Поиск по объявлениям</span>
              </span>
              <span class="search-location">
                <img class="control-icon control-icon-location" src="https://www.figma.com/api/mcp/asset/f16e4f59-31a2-49b8-9de2-66042955921c" alt="" aria-hidden="true">
                <span>Петропавловск-Камчатский</span>
              </span>
            </div>
          </div>

          <nav class="header-icons" aria-label="Пользовательские действия">
            <span class="header-icon header-icon-muted" aria-label="Избранное">
              <img src="https://www.figma.com/api/mcp/asset/d7dbc92c-08f6-4545-b66a-cc2f22f2c254" alt="">
            </span>
            <span class="header-icon header-icon-muted" aria-label="Уведомления">
              <img src="https://www.figma.com/api/mcp/asset/aa074f2b-dec4-47cc-9ba2-36edd9d835ce" alt="">
            </span>
            <span class="header-icon header-icon-muted" aria-label="Чат">
              <img src="https://www.figma.com/api/mcp/asset/6ef1f39f-66ae-4dfa-b546-05154efa26cc" alt="">
            </span>
            <span class="header-icon header-icon-ticket" aria-label="Сервисы">
              <img src="https://www.figma.com/api/mcp/asset/8069664d-4b3c-4998-98e1-98e69bd7cb7e" alt="">
            </span>
          </nav>

          <div class="profile-link" aria-label="Профиль">
            <img src="https://www.figma.com/api/mcp/asset/194894da-c593-47a6-a01e-4e975e1fa61b" alt="">
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
